sort_order = ["tmux", "config"]

[default_session]
startup_command = "ls"
preview_command = "eza --all --git --icons --color=always {}"
# startup_command_ignore_dirs = ["~/repos", "~/.config"]

[[session]]
name = "home"
path = "$HOME"
disable_startup_command = true

[[session]]
name = "dotfiles"
path = "$HOME/dotfiles"
startup_command = "ls"
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "quartz"
path = "$HOME/Desktop/2. AREAS/Digital Garden/quartz"
startup_command = "nvim content/index.md"
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "brain"
path = "$HOME/Desktop/2. AREAS/Second Brain"
startup_command = "ls"
preview_command = "eza --all --git --icons --color=always {}"
