#
# Smart session manager for the terminal
# https://github.com/joshmedeski/sesh

sort_order = ["tmux", "config"]

[default_session]
startup_command = "ls"
preview_command = "eza --all --git --icons --color=always {}"
# startup_command_ignore_dirs = ["~/repos", "~/.config"]

[[session]]
name = "home (~)"
path = "~"
disable_startup_command = true

[[session]]
name = "downloads (📥)"
path = "~/Downloads"
startup_command = "yazi"

[[session]]
name = "dotfiles"
path = "~/dotfiles"
startup_command = "ls"
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "tmux config"
path = "~/dotfiles/tmux"
startup_command = "nvim .tmux.conf"
preview_command = "bat --color=always ~/.tmux.conf"

[[session]]
name = "zsh config"
path = "~/dotfiles/zsh"
startup_command = "nvim .zshrc"
preview_command = "bat --color=always ~/.zshrc"

[[session]]
name = "hammerspoon config"
path = "~/.config/hammerspoon-config"
startup_command = "git status"
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "sesh config"
path = "~/dotfiles/config/.config/sesh"
startup_command = "nvim sesh.toml"
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "alacritty config"
path = "~/dotfiles/config/.config/alacritty"
startup_command = "nvim alacritty.toml"
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "yazi config"
path = "~/dotfiles/config/.config/yazi"
startup_command = "ls"
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "nvim config"
path = "~/dotfiles/config/.config/nvim"
startup_command = "ls"
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "skilledin"
path = "~/Desktop/1. PROJECTS/skilledin"
startup_command = "ls"
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "gtdust"
path = "~/Desktop/1. PROJECTS/gtdust"
startup_command = "ls"
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "learn-rust"
path = "~/Desktop/1. PROJECTS/learn-rust"
startup_command = "ls"
preview_command = "eza --all --git --icons --color=always {}"
