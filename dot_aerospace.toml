after-login-command = []

after-startup-command = [
  'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0'
]

start-at-login = true 

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

default-root-container-layout = 'tiles'

default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = true

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 0
inner.vertical =   0
outer.left =       0
outer.bottom =     0
outer.top =        0
outer.right =      0



############################## MAIN MODE ##############################

[mode.main.binding]

alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

### UPDATE THESE AS THESE WILL NOT WORK IN ALL THE APPS
#alt-shift-minus = 'resize smart -50'
#alt-shift-equal = 'resize smart +50'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-9 = 'workspace 9-Calendar'
alt-0 = 'workspace 0-Other'
alt-b = 'workspace Browser'
alt-c = 'workspace Communication'
alt-e = 'workspace Editor'
alt-n = 'workspace Notes'
alt-r = 'workspace Research'
alt-t = 'workspace Terminal'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-9 = 'move-node-to-workspace 9-Calendar'
alt-shift-0 = 'move-node-to-workspace 0-Other'
alt-shift-b = 'move-node-to-workspace Browser'
alt-shift-c = 'move-node-to-workspace Communication'
alt-shift-e = 'move-node-to-workspace Editor'
alt-shift-n = 'move-node-to-workspace Notes'
alt-shift-r = 'move-node-to-workspace Research'
alt-shift-t = 'move-node-to-workspace Terminal'

alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

alt-shift-semicolon = 'mode service'



############################## SERVICE MODE ##############################

[mode.service.binding]

esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']



# =================================================================
#
# Assign apps on particular workspaces
#
# Use this command to get IDs of running applications:
#   aerospace list-apps
#
# =================================================================

[[on-window-detected]]
if.app-id = 'md.obsidian'				# Obsidian
run = 'move-node-to-workspace Notes'

[[on-window-detected]]
if.app-id = 'com.apple.Notes'				# Apple Notes
run = 'move-node-to-workspace Notes'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'				# Google Chrome
run = 'move-node-to-workspace Browser'

[[on-window-detected]]
if.app-id = 'org.mozilla.floorp'			# Floorp
run = 'move-node-to-workspace Browser'

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'			# WhatsApp
run = 'move-node-to-workspace Communication'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'			# Slack
run = 'move-node-to-workspace Communication'

[[on-window-detected]]
if.app-id = 'com.cron.electron'				# Notion Calendar
run = 'move-node-to-workspace 9-Calendar'

[[on-window-detected]]
if.app-id = 'com.googlecode.iterm2'			# iTerm2 
run = 'move-node-to-workspace Terminal'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'			# Ghostty
run = 'move-node-to-workspace Terminal'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'			# VS Code
run = ['layout floating', 'move-node-to-workspace Editor']

[[on-window-detected]]
if.app-id = 'com.todesktop.230313mzl4w4u92'		# Cursor
run = ['layout floating', 'move-node-to-workspace Editor']

[[on-window-detected]]
if.app-id = 'com.apple.finder'				# Finder
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'org.hammerspoon.Hammerspoon'		# Hammerspoon
run = ['layout floating']

[[on-window-detected]]					# Make all the other applications / windows float in 0-Other Workspace
check-further-callbacks = true
run = ['layout floating', 'move-node-to-workspace 0-Other']

