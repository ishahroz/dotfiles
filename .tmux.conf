################################################# BASICS ######################################################
# Easy config reload (prefix + r)
bind-key r source-file ~/.tmux.conf \; display-message "tmu.conf reloaded."

# Mouse Mode
set -g mouse on

# Colors
set -g default-terminal "tmux-256color"

# General statusline customisation
set-option -g status-position bottom
set -g status-style 'bg=terminal'

# Border above status line
set -g pane-border-format ""
set -g pane-border-status bottom
set -g pane-border-style fg=colour0
set -g pane-active-border-style fg=colour0


############################################# PLUGINS #########################################################
# Plugins List (powered by TPM: https://github.com/tmux-plugins/tpm)
# Can find new plugins from this link: https://github.com/tmux-plugins/list
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Catppuccin theme for tmux
# Find more info here: https://github.com/catppuccin/tmux
set -g @plugin 'catppuccin/tmux'

# Nerd Font icons for the tmux windows
# Find more info here: https://github.com/joshmedeski/tmux-nerd-font-window-name
# Make sure `yq` is installed using Homebrew: `brew install yq`
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'


############################################# THEMING #########################################################
# Configure the catppuccin plugin
set -g @catppuccin_flavor 'mocha'
#set -g @catppuccin_window_status_style "rounded"
#set -g @catppuccin_status_background "none"

# Load catppuccin
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# status right style
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[bg=#{@thm_mantle},fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# status left style
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_mantle},bold]  #S },#{#[bg=#{@thm_mantle},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_mantle},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_mantle},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_mantle},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_mantle},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "

# window style
set -wg automatic-rename on
set -g automatic-rename-format ''
set -g window-status-separator '|'
set -g status-justify 'absolute-centre'
set -g @catppuccin_window_status_style 'custom'
set -g @catppuccin_window_flags ""
set -g @catppuccin_window_number ""
set -g @catppuccin_window_text "#[fg=#{@thm_rosewater},bg=#{@thm_mantle}] #I#{?#{!=:#{window_name},},: #W ,}"
set -g @catppuccin_window_current_number ""
set -g @catppuccin_window_current_text "#[fg=#{@thm_mantle},bg=#{@thm_peach}] #I#{?#{!=:#{window_name},},: #W ,}"


############################################### TPM ######################################################
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
